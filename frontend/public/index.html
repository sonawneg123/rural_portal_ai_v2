<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="theme-color" content="#0A2540"/>
    <meta name="description" content="ग्रामीण पोर्टल — AI-powered rural India civic problem reporting. CM, Collector, MLA, Sarpanch and Gram Sevak dashboards. Groq AI severity scoring."/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="icon" href="/favicon.ico"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>ग्रामीण पोर्टल — Rural Governance Portal</title>
    <style>
      body{margin:0;background:#F8FAFC;font-family:'Inter',system-ui,sans-serif}
      #root{min-height:100vh}
      #initial-loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F8FAFC;z-index:9999;transition:opacity .4s ease}
      #initial-loader.hidden{opacity:0;pointer-events:none}
      #initial-loader .logo{width:56px;height:56px;border-radius:14px;background:#0A2540;display:flex;align-items:center;justify-content:center;margin-bottom:18px;animation:lf 2s ease-in-out infinite}
      #initial-loader .logo span{font-size:28px}
      #initial-loader .ring{width:34px;height:34px;border-radius:50%;border:3px solid rgba(10,37,64,.12);border-top-color:#0A2540;animation:ls .75s linear infinite}
      @keyframes lf{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes ls{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="initial-loader"><div class="logo"><span>🌿</span></div><div class="ring"></div></div>
    <noscript><p style="padding:40px;text-align:center">Please enable JavaScript to use ग्रामीण पोर्टल.</p></noscript>
    <div id="root"></div>
    <script>
      window.addEventListener('load',function(){
        setTimeout(function(){var l=document.getElementById('initial-loader');if(l){l.classList.add('hidden');setTimeout(function(){l.remove()},400)}},350);
      });
    </script>
  </body>
</html>
